<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD 2399 PANEL</title>
    <style>
        /* الخطوط والتنسيق العام */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap');
        
        body { 
            margin: 0; 
            background: #000; 
            overflow: hidden; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Cairo', sans-serif; 
        }

        /* خلفية الفيديو - مقاس الجوال تماماً */
        #video-bg { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            object-fit: cover; 
        }

        /* اللوحة - شفافة جداً ومخفية */
        .card { 
            width: 85%; 
            max-width: 340px; 
            background: rgba(0, 0, 0, 0.15); /* شفافية عالية جداً */
            border: 1px solid rgba(255, 0, 0, 0.2); 
            border-radius: 25px; 
            padding: 25px; 
            text-align: center; 
            color: #fff;
            backdrop-filter: blur(2px); 
            -webkit-backdrop-filter: blur(2px);
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        h1 { color: #f00; text-shadow: 0 0 10px #f00; font-size: 24px; margin-bottom: 20px; font-weight: 900; }
        
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: rgba(0,0,0,0.4); 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 14px;
            outline: none;
        }

        /* الأزرار */
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: rgba(255, 0, 0, 0.5); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            transition: 0.3s;
        }
        
        .btn:active { transform: scale(0.95); background: rgba(255, 0, 0, 0.8); }

        .btn-red { background: rgba(100, 0, 0, 0.4); border: 1px solid #f00; font-size: 12px; padding: 10px; }

        .hidden { display: none; }

        /* صندوق التعهد */
        .pledge-box { 
            background: rgba(0,0,0,0.5); 
            padding: 15px; 
            border-radius: 15px; 
            border: 1px dashed #f00; 
            font-size: 13px; 
            margin-bottom: 15px; 
        }

        a { color: #5865f2; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <!-- فيديو الخلفية -->
    <video autoplay loop muted playsinline id="video-bg">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>

    <!-- الخطوة 0: التعهد -->
    <div id="step0" class="card">
        <h1>2399 SYSTEM</h1>
        <div class="pledge-box">
            <p>يجب الانضمام لسيرفرنا للمتابعة</p>
            <a href="https://discord.gg/2399k" target="_blank">اضغط هنا للدخول</a>
            <hr style="border-color:#444; margin:10px 0">
            <label style="cursor:pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                <input type="checkbox" id="pCheck" style="width:18px; height:18px;"> 
                أتعهد بالدخول للسيرفر
            </label>
        </div>
        <button class="btn" onclick="nextStep(0, 1)">استمرار</button>
    </div>

    <!-- الخطوة 1: تسجيل الدخول -->
    <div id="step1" class="card hidden">
        <h1>LOGIN</h1>
        <input type="password" id="tk" placeholder="توكن البوت">
        <input type="text" id="id" placeholder="ايدي السيرفر">
        <button class="btn" onclick="nextStep(1, 2)">فتح اللوحة</button>
    </div>

    <!-- الخطوة 2: لوحة التحكم -->
    <div id="step2" class="card hidden">
        <h1>CONTROL</h1>
        <input type="text" id="nm" placeholder="اسم الرومات">
        <textarea id="ms" placeholder="رسالة السبام" rows="2"></textarea>
        
        <button class="btn" style="background: rgba(255, 0, 0, 0.7);" onclick="fire('تدمير')">تدمير شامل + طرد 💀</button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px">
            <button class="btn btn-red" onclick="fire('طرد')">طرد الكل 👤</button>
            <button class="btn btn-red" onclick="fire('سبام')">سبام فقط ⚡</button>
        </div>
        <p style="font-size:10px; margin-top:15px; opacity:0.5">Lord 2399 | https://discord.gg/2399k</p>
    </div>

    <script>
        // تنقل بين الخطوات
        function nextStep(current, next) {
            if (current === 0 && !document.getElementById('pCheck').checked) {
                alert("يا لورد، لازم توافق على التعهد أولاً!");
                return;
            }
            document.getElementById('step' + current).classList.add('hidden');
            document.getElementById('step' + next).classList.remove('hidden');
        }

        // إرسال الأوامر للسيرفر
        async function fire(actionType) {
            const botToken = document.getElementById('tk').value;
            const serverId = document.getElementById('id').value;
            const cName = document.getElementById('nm').value;
            const cMsg = document.getElementById('ms').value;

            if (!botToken || !serverId) {
                alert("البيانات ناقصة يا لورد!");
                return;
            }

            // إرسال الطلب لـ Render
            try {
                fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: botToken, 
                        guildId: serverId, 
                        action: actionType, 
                        customName: cName, 
                        customMsg: cMsg 
                    })
                });
                alert("🚀 تم إرسال الأمر! شيك على السيرفر");
            } catch (err) {
                alert("خطأ في الاتصال بالسيرفر");
            }
        }
    </script>
</body>
</html>
