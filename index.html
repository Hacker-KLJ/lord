<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toll Group 2399 V9 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@700&display=swap');
        
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.4; filter: contrast(150%) hue-rotate(280deg); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #000); z-index: -1; }

        .v9-container { 
            width: 90%; max-width: 450px; 
            background: rgba(10, 10, 10, 0.85); 
            border: 2px solid #f00; 
            border-radius: 5px; padding: 30px; 
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3), inset 0 0 15px rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Orbitron'; color: #f00; font-size: 24px; text-shadow: 0 0 20px #f00; letter-spacing: 3px; margin-bottom: 25px; animation: glitch 1s infinite; }
        @keyframes glitch { 0% { transform: skew(0deg); } 20% { transform: skew(2deg); color: #fff; } 40% { transform: skew(-2deg); } 100% { transform: skew(0deg); } }

        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(0,0,0,0.9); border: 1px solid #333; 
            color: #ff0000; border-radius: 0; font-family: 'Orbitron'; 
            box-sizing: border-box; font-size: 13px; transition: 0.3s;
        }
        input:focus { border-color: #f00; box-shadow: 0 0 10px #f00; }

        .btn-v9 { 
            width: 100%; padding: 18px; background: #f00; color: #fff; 
            border: none; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron'; letter-spacing: 2px; margin-top: 15px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }
        .btn-v9:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        .status-bar { font-size: 10px; margin-top: 20px; color: #555; text-transform: uppercase; display: flex; justify-content: space-between; }
        
        .loading-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index: 10; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .matrix-text { font-family: 'Orbitron'; font-size: 14px; margin-top: 15px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="v9-container">
        <!-- شاشة التحميل V9 -->
        <div id="loader" class="loading-screen">
            <h2 style="color:#f00; font-family:'Orbitron'">SYSTEM INITIALIZING...</h2>
            <div style="width:150px; height:2px; background:#222; position:relative">
                <div id="bar" style="width:0%; height:100%; background:#f00; position:absolute; box-shadow:0 0 10px #f00"></div>
            </div>
            <div class="matrix-text" id="load-text">DECRYPTING... 0%</div>
        </div>

        <!-- الواجهة الرئيسية -->
        <div id="main-content" class="hidden">
            <h1>TOLL GROUP V9 PRO</h1>
            
            <div id="login-fields">
                <input type="password" id="tk" placeholder="ACCESS TOKEN">
                <input type="text" id="id" placeholder="TARGET GUILD ID">
                <button class="btn-v9" onclick="unlock()">UNLOCK SYSTEM</button>
            </div>

            <div id="controls" class="hidden">
                <input type="text" id="nm" placeholder="CHANNELS NAME">
                <textarea id="ms" placeholder="DESTRUCTION MESSAGE" rows="2"></textarea>
                
                <button class="btn-v9" onclick="fire('تدمير')">NUKE SERVER (ULTIMATE)</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-v9" style="background:#111; border:1px solid #f00; font-size:10px" onclick="fire('طرد')">MASS KICK</button>
                    <button class="btn-v9" style="background:#111; border:1px solid #f00; font-size:10px" onclick="fire('سبام')">ULTRA SPAM</button>
                </div>
            </div>

            <div class="status-bar">
                <span>Status: <b style="color:#0f0">Encrypted</b></span>
                <span>V9.0.1 PRO</span>
            </div>
        </div>
    </div>

    <script>
        // أنميشن التحميل الاحترافي
        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 5) + 1;
            if(progress >= 100) {
                progress = 100;
                clearInterval(interval);
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            }
            document.getElementById('bar').style.width = progress + '%';
            document.getElementById('load-text').innerText = 'DECRYPTING... ' + progress + '%';
        }, 50);

        function unlock() {
            if(!document.getElementById('tk').value || !document.getElementById('id').value) return alert("ACCESS DENIED: MISSING DATA");
            document.getElementById('login-fields').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
        }

        async function fire(act) {
            const btn = event.target;
            btn.innerText = "EXECUTING...";
            btn.style.opacity = "0.5";

            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: document.getElementById('tk').value,
                        guildId: document.getElementById('id').value,
                        customName: document.getElementById('nm').value,
                        customMsg: document.getElementById('ms').value,
                        action: act
                    })
                });
                const data = await res.json();
                alert(data.status);
            } catch (e) {
                alert("SYSTEM NOTIFICATION: ATTACK LAUNCHED!");
            }
            btn.innerText = "COMPLETE";
            btn.style.opacity = "1";
        }
    </script>
</body>
</html>
