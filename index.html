<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD 2399 PANEL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@600;900&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Cairo', sans-serif; overflow-x: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { width: 90%; max-width: 380px; background: rgba(10,0,0,0.95); border: 1px solid #f00; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px #f00; text-align: center; }
        h1 { font-family: 'Orbitron'; color: #f00; text-shadow: 0 0 10px #f00; margin: 5px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background: #f00; color: #fff; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        .btn-small { background: #222; border: 1px solid #f00; padding: 10px; font-size: 12px; }
        .hidden { display: none; }
        .link { color: #5865f2; text-decoration: none; font-weight: bold; display: block; margin: 10px; }
        .pledge-box { background: #111; padding: 15px; border-radius: 10px; border: 1px dashed #f00; font-size: 13px; }
        .rights { font-size: 10px; color: #555; margin-top: 15px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <!-- المرحلة 0: التعهد -->
    <div id="step0" class="card">
        <h1>ATTENTION</h1>
        <div class="pledge-box">
            <p>يجب عليك دخول سيرفر ديسكورد الرسمي قبل الاستخدام</p>
            <a href="https://discord.gg/DcKVbTkW8" class="link" target="_blank">اضغط هنا لدخول السيرفر</a>
            <hr style="border:0.5px solid #333">
            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input type="checkbox" id="pledgeCheck" style="width: 20px;">
                <span>أتعهد بالدخول وأبرئ ذمة لورد 2399 من أي استخدام</span>
            </label>
        </div>
        <button class="btn" onclick="goToLogin()">دخول للموقع</button>
    </div>

    <!-- المرحلة 1: الدخول -->
    <div id="step1" class="card hidden">
        <h1>LOGIN</h1>
        <input type="password" id="tk" placeholder="BOT TOKEN">
        <input type="text" id="id" placeholder="SERVER ID">
        <button class="btn" onclick="goToPanel()">CONNECT SYSTEM</button>
        <div class="rights">Rights reserved to LORD 2399</div>
    </div>

    <!-- المرحلة 2: لوحة التحكم -->
    <div id="step2" class="card hidden" style="max-height: 90vh; overflow-y: auto;">
        <h1>LORD 2399</h1>
        
        <div style="text-align: right; font-size: 12px; color: #f00;">إعدادات الأسماء:</div>
        <input type="text" id="customName" placeholder="اكتب اسم الرومات هنا...">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <button class="btn btn-small" onclick="run('تغيير الأسماء')">تغيير الأسماء</button>
            <button class="btn btn-small" onclick="run('إنشاء رومات')">إنشاء 60 روم</button>
        </div>

        <div style="text-align: right; font-size: 12px; color: #f00; margin-top: 15px;">إعدادات الرسائل:</div>
        <textarea id="customMsg" placeholder="اكتب رسالة السبام هنا..."></textarea>
        <button class="btn btn-small" style="width:100%" onclick="run('إرسال سبام')">إرسال 100 رسالة بكل الرومات</button>

        <hr style="border: 1px solid #333; margin: 20px 0;">
        <button class="btn" style="background: linear-gradient(90deg, #600, #f00); height: 60px; font-size: 20px;" onclick="run('ابدأ')">ابدأ التدمير 💀</button>
        
        <div class="footer">
            <p style="font-size: 12px; margin-bottom: 0;">لورد 2399 | Discord: l07d</p>
        </div>
    </div>

    <script>
        function goToLogin() {
            if(!document.getElementById('pledgeCheck').checked) return alert("يجب الموافقة والتعهد أولاً!");
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
        }

        function goToPanel() {
            if(!document.getElementById('tk').value || !document.getElementById('id').value) return alert("أدخل البيانات!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }

        async function run(a) {
            const tk = document.getElementById('tk').value;
            const id = document.getElementById('id').value;
            const name = document.getElementById('customName').value;
            const msg = document.getElementById('customMsg').value;

            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token: tk, guildId: id, action: a, customName: name, customMsg: msg})
                });
                const d = await res.json();
                alert(d.status);
            } catch (e) { alert("خطأ في السيرفر!"); }
        }
    </script>
</body>
</html>
