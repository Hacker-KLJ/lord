<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Group 2399 </title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #stars { position: fixed; width: 100%; height: 100%; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid #333; width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #00ffcc; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #5865f2; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .act { background: #222; border: 1px solid #444; color: white; padding: 15px 5px; border-radius: 10px; font-size: 12px; }
        .nuke { grid-column: span 2; background: #ff4747; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="stars"></div>
    <div id="p1" class="card">
        <h2 style="color:#5865f2">Group 2399</h2>
        <input type="password" id="tk" placeholder="توكن البوت">
        <input type="text" id="id" placeholder="آيدي السيرفر">
        <button class="btn" onclick="showDash()">دخول</button>
        <div style="margin-top:20px; font-size:12px;">
            <a href="https://youtube.com/@lord_4040" style="color:#aaa; text-decoration:none;">Lord YouTube</a>
        </div>
    </div>
    <div id="p2" class="card hidden">
        <h3>تحكم Lord</h3>
        <div class="grid">
            <button class="act" onclick="run('حذف الرومات')">حذف الرومات</button>
            <button class="act" onclick="run('تغيير الأسماء')">تغيير الأسماء</button>
            <button class="act" onclick="run('طرد الجميع')">طرد الجميع</button>
            <button class="act nuke" onclick="run('الضربة القاضية')">الضربة القاضية 💀</button>
        </div>
    </div>

    <script>
        for(let i=0; i<80; i++) {
            let s = document.createElement('div'); s.className='star';
            s.style.width=s.style.height=Math.random()*3+'px';
            s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
            document.getElementById('stars').appendChild(s);
        }
        function showDash() {
            if(!document.getElementById('tk').value) return alert("حط التوكن!");
            document.getElementById('p1').classList.add('hidden');
            document.getElementById('p2').classList.remove('hidden');
        }
        async function run(a) {
            const res = await fetch('/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({token:document.getElementById('tk').value, guildId:document.getElementById('id').value, action:a})
            });
            const d = await res.json(); alert(d.status);
        }
    </script>
</body>
</html>
