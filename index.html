<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LORD V7 PRO</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.5; }
        .card { width: 90%; max-width: 380px; background: rgba(0,0,0,0.4); border: 2px solid #f00; border-radius: 20px; padding: 25px; text-align: center; backdrop-filter: blur(10px); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1px solid #f00; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #f00; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline><source src="https://a.top4top.io/m_3745ydpjj9.mp4"></video>

    <!-- صفحة التحميل -->
    <div id="s0" class="card">
        <h2 style="color:#f00">Lord v4 2399</h2>
        <div style="border:3px solid #111; border-top:3px solid #f00; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; margin:20px auto"></div>
    </div>

    <!-- اللوحة -->
    <div id="s1" class="card hidden">
        <h1 style="color:#f00; font-size:20px">Tools Lord v4 2399</h1>
        <input type="password" id="tk" placeholder="توكن البوت">
        <input type="text" id="id" placeholder="ايدي السيرفر">
        <input type="text" id="nm" placeholder="اسم الرومات">
        <textarea id="ms" placeholder="رسالة التدمير"></textarea>
        <button class="btn" onclick="fire('تدمير')">تدمير شامل 💀</button>
        <button class="btn" style="background:#222; border:1px solid #f00" onclick="fire('طرد')">طرد الجميع 👤</button>
    </div>

    <script>
        @keyframes spin { 100% { transform: rotate(360deg); } }
        setTimeout(() => { document.getElementById('s0').classList.add('hidden'); document.getElementById('s1').classList.remove('hidden'); }, 3000);

        async function fire(act) {
            const btn = event.target;
            btn.innerText = "جاري الاتصال...";
            
            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: document.getElementById('tk').value,
                        guildId: document.getElementById('id').value,
                        customName: document.getElementById('nm').value,
                        customMsg: document.getElementById('ms').value,
                        action: act
                    })
                });
                
                const data = await res.json();
                alert(data.status); // هنا بيطلع لك ليش البوت ما اشتغل بالضبط
            } catch (e) {
                alert("❌ خطأ: السيرفر طافي أو Render معلق");
            }
            btn.innerText = "تدمير شامل 💀";
        }
    </script>
</body>
</html>
