<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD 2399</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: sans-serif; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; object-fit: cover; }
        
        /* اللوحة مخفية جداً */
        .card { 
            width: 85%; max-width: 350px; 
            background: rgba(0, 0, 0, 0.15); /* شبه شفافة تماماً */
            border: 1px solid rgba(255, 0, 0, 0.2); 
            border-radius: 20px; padding: 25px; 
            text-align: center; color: #fff;
            backdrop-filter: blur(1px); -webkit-backdrop-filter: blur(1px);
        }

        h1 { color: #f00; text-shadow: 0 0 10px #f00; font-size: 24px; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: rgba(255, 0, 0, 0.4); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>

    <div id="step1" class="card">
        <h1>LORD 2399</h1>
        <input type="password" id="tk" placeholder="BOT TOKEN">
        <input type="text" id="id" placeholder="SERVER ID">
        <button class="btn" onclick="runAction('تدمير')">ابدأ التدمير 💀</button>
        <button class="btn" style="background:rgba(0,0,0,0.5)" onclick="runAction('سبام')">سبام فقط ⚡</button>
        <p style="font-size:10px; margin-top:15px; opacity:0.6">https://discord.gg/2399k</p>
    </div>

    <script>
        async function runAction(act) {
            const tk = document.getElementById('tk').value;
            const id = document.getElementById('id').value;
            if(!tk || !id) return alert("أدخل البيانات يا لورد");

            try {
                // إرسال الطلب لـ Render
                fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: tk, guildId: id, action: act })
                });
                
                alert("🚀 انطلق الهجوم! شيك على السيرفر");
            } catch (e) {
                alert("خطأ في السيرفر");
            }
        }
    </script>
</body>
</html>
