<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORD 2399</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Cairo:wght@900&display=swap');
        body { margin: 0; background: #000; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* فيديو مقاس الجوال تماماً */
        #video-bg { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: -2; object-fit: cover; 
        }

        /* لوحة مخفية (شفافية عالية) */
        .card { 
            width: 85%; max-width: 340px; 
            background: rgba(0, 0, 0, 0.25); /* شفافة جداً لدرجة الاختفاء */
            border: 1px solid rgba(255, 0, 0, 0.4); 
            border-radius: 20px; padding: 20px; 
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); 
            text-align: center; color: #fff;
            backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); 
        }

        h1 { font-family: 'Orbitron'; color: #f00; text-shadow: 0 0 10px #f00; font-size: 22px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.4); border: 1px solid #444; color: #fff; border-radius: 10px; font-size: 12px; }
        .btn { width: 100%; padding: 12px; background: rgba(255, 0, 0, 0.6); color: #fff; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 5px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        .btn-small { background: rgba(0, 0, 0, 0.5); border: 1px solid #f00; padding: 8px; font-size: 10px; color: white; border-radius: 8px; }
        .pledge-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 12px; border: 1px dashed #f00; font-size: 11px; }
        .hidden { display: none; }
        .footer-info { font-size: 9px; color: #ccc; margin-top: 10px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="video-bg">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>

    <div id="step0" class="card">
        <h1>2399 SYSTEM</h1>
        <div class="pledge-box">
            <p>ادخل سيرفر ديسكورد الرسمي</p>
            <a href="https://discord.gg/2399k" style="color:#5865f2; text-decoration:none; font-weight:bold" target="_blank">رابط السيرفر</a>
            <hr style="border-color:#333">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="pledgeCheck">
                <span>أتعهد بالدخول وأبرئ ذمة Lord 2399</span>
            </label>
        </div>
        <button class="btn" onclick="goToLogin()">الموافقة والدخول</button>
    </div>

    <div id="step1" class="card hidden">
        <h1>LOGIN</h1>
        <input type="password" id="tk" placeholder="BOT TOKEN">
        <input type="text" id="id" placeholder="SERVER ID">
        <button class="btn" onclick="goToPanel()">CONNECT</button>
    </div>

    <div id="step2" class="card hidden">
        <h1>LORD PANEL</h1>
        <input type="text" id="customName" placeholder="اسم الرومات">
        <div class="grid">
            <button class="btn-small" onclick="run('تغيير الأسماء')">تغيير الأسماء</button>
            <button class="btn-small" onclick="run('إنشاء رومات')">إنشاء 60 روم</button>
        </div>
        <textarea id="customMsg" placeholder="رسالة السبام" rows="2"></textarea>
        <button class="btn-small" style="width:100%" onclick="run('إرسال سبام')">إرسال سبام</button>
        <button class="btn-small" style="width:100%; background: rgba(50,0,0,0.4); margin-top:5px" onclick="run('طرد الجميع')">طرد الجميع 👤</button>
        <button class="btn" onclick="run('ابدأ التدمير 💀')">ابدأ التدمير 💀</button>
        <div class="footer-info">Lord 2399 | Discord: l07d</div>
    </div>

    <script>
        function goToLogin() {
            if(!document.getElementById('pledgeCheck').checked) return alert("وافق أولاً!");
            document.getElementById('step0').classList.add('hidden');
            document.getElementById('step1').classList.remove('hidden');
        }
        function goToPanel() {
            if(!document.getElementById('tk').value || !document.getElementById('id').value) return alert("أدخل البيانات!");
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
        }
        async function run(a) {
            const tk = document.getElementById('tk').value;
            const id = document.getElementById('id').value;
            const name = document.getElementById('customName').value;
            const msg = document.getElementById('customMsg').value;
            try {
                const res = await fetch(`${window.location.origin}/execute`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({token: tk, guildId: id, action: a, customName: name, customMsg: msg})
                });
                const d = await res.json();
                alert(d.status);
            } catch (e) { alert("⚠️ خطأ في الاتصال بالسيرفر!"); }
        }
    </script>
</body>
</html>
