<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toll Group 2399 V9 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@700&display=swap');
        
        body { margin: 0; background: #000; color: #00ff00; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.4; filter: contrast(150%) hue-rotate(280deg); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent, #000); z-index: -1; }

        .v9-container { 
            width: 90%; max-width: 450px; 
            background: rgba(10, 10, 10, 0.85); 
            border: 2px solid #f00; 
            border-radius: 5px; padding: 30px; 
            text-align: center; position: relative;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3), inset 0 0 15px rgba(255, 0, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        h1 { font-family: 'Orbitron'; color: #f00; font-size: 22px; text-shadow: 0 0 20px #f00; letter-spacing: 2px; margin-bottom: 25px; }
        
        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: rgba(0,0,0,0.9); border: 1px solid #333; 
            color: #ff0000; border-radius: 0; font-family: 'Orbitron'; 
            box-sizing: border-box; font-size: 13px;
        }

        .btn-v9 { 
            width: 100%; padding: 18px; background: #f00; color: #fff; 
            border: none; font-weight: 900; cursor: pointer; 
            font-family: 'Orbitron'; letter-spacing: 2px; margin-top: 15px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }
        .btn-v9:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        .pledge-section {
            background: rgba(255, 0, 0, 0.05);
            border: 1px dashed #f00;
            padding: 20px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #fff;
        }

        .server-link {
            display: inline-block;
            margin: 15px 0;
            padding: 10px 20px;
            background: #5865F2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .server-link:hover { background: #4752c4; transform: scale(1.05); }

        .hidden { display: none; }
        
        /* شاشة التحميل */
        .loading-screen { position: absolute; top:0; left:0; width:100%; height:100%; background:#000; z-index: 10; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .loader-bar { width: 150px; height: 3px; background: #222; margin-top: 15px; position: relative; overflow: hidden; }
        .loader-fill { width: 0%; height: 100%; background: #f00; box-shadow: 0 0 10px #f00; transition: 0.1s; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>

    <div class="v9-container">
        
        <!-- 1. شاشة جاري الدخول (التحميل) -->
        <div id="step-load" class="loading-screen">
            <h2 style="color:#f00; font-family:'Orbitron'; letter-spacing: 2px;">INITIALIZING V9 PRO</h2>
            <div class="loader-bar"><div id="bar-fill" class="loader-fill"></div></div>
            <p id="load-status" style="font-size: 10px; margin-top: 10px;">CONNECTING TO SERVER... 0%</p>
        </div>

        <!-- 2. شاشة التعهد والسيرفر -->
        <div id="step-pledge" class="hidden">
            <h1>SECURITY PLEDGE</h1>
            <div class="pledge-section">
                <p>أهلاً بك في Toll Group 2399 V9 Pro.</p>
                <p>للمتابعة، يجب الانضمام للمقر الرسمي:</p>
                <a href="https://discord.gg/2399k" target="_blank" class="server-link">انضم لسيرفر الدعم</a>
                <hr style="border:0.5px solid #333; margin:15px 0">
                <label style="cursor:pointer; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <input type="checkbox" id="pledgeCheck" style="width:18px; height:18px">
                    <span>أتعهد بالدخول للسيرفر وعدم المخالفة</span>
                </label>
            </div>
            <button class="btn-v9" onclick="validatePledge()">تأكيد واستمرار</button>
        </div>

        <!-- 3. شاشة تسجيل الدخول -->
        <div id="step-login" class="hidden">
            <h1>ACCESS TERMINAL</h1>
            <input type="password" id="tk" placeholder="BOT TOKEN">
            <input type="text" id="id" placeholder="GUILD ID">
            <button class="btn-v9" onclick="showPanel()">دخول للوحة التحكم</button>
        </div>

        <!-- 4. لوحة التحكم النهائية -->
        <div id="step-panel" class="hidden">
            <h1 style="font-size: 18px;">Toll Group 2399 V9 Pro</h1>
            <input type="text" id="nm" placeholder="اسم الرومات الجديد">
            <textarea id="ms" placeholder="رسالة التدمير الشامل" rows="2"></textarea>
            
            <button class="btn-v9" onclick="executeAction('تدمير')" style="background: linear-gradient(45deg, #f00, #600);">NUKE SERVER 💀</button>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-v9" style="background:#111; border:1px solid #f00; font-size:10px" onclick="executeAction('طرد')">MASS KICK</button>
                <button class="btn-v9" style="background:#111; border:1px solid #f00; font-size:10px" onclick="executeAction('سبام')">ULTRA SPAM</button>
            </div>
        </div>

    </div>

    <script>
        // أنميشن التحميل
        let prog = 0;
        const loadInt = setInterval(() => {
            prog += Math.floor(Math.random() * 4) + 1;
            if(prog >= 100) {
                prog = 100;
                clearInterval(loadInt);
                setTimeout(() => {
                    document.getElementById('step-load').classList.add('hidden');
                    document.getElementById('step-pledge').classList.remove('hidden');
                }, 500);
            }
            document.getElementById('bar-fill').style.width = prog + '%';
            document.getElementById('load-status').innerText = 'DECRYPTING SYSTEM... ' + prog + '%';
        }, 60);

        function validatePledge() {
            if(!document.getElementById('pledgeCheck').checked) {
                alert("يا لورد، لازم توافق على التعهد وتدخل السيرفر!");
                return;
            }
            document.getElementById('step-pledge').classList.add('hidden');
            document.getElementById('step-login').classList.remove('hidden');
        }

        function showPanel() {
            if(!document.getElementById('tk').value || !document.getElementById('id').value) {
                alert("أدخل البيانات المطلوبة للوصول!");
                return;
            }
            document.getElementById('step-login').classList.add('hidden');
            document.getElementById('step-panel').classList.remove('hidden');
        }

        async function executeAction(type) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "EXECUTING...";
            btn.disabled = true;

            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: document.getElementById('tk').value,
                        guildId: document.getElementById('id').value,
                        customName: document.getElementById('nm').value,
                        customMsg: document.getElementById('ms').value,
                        action: type
                    })
                });
                const data = await res.json();
                alert(data.status);
            } catch (e) {
                alert("🚀 V9 PRO: انطلقت القوة التدميرية!");
            }
            btn.innerText = originalText;
            btn.disabled = false;
        }
    </script>
</body>
</html>
