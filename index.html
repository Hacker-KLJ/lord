<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toll Group 2399 V11 Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Orbitron:wght@500;900&display=swap');
        
        body { margin: 0; background: #000; color: #f00; font-family: 'Cairo', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; opacity: 0.4; filter: grayscale(100%) contrast(120%); }
        
        /* اللوحة الشفافة تماماً */
        .v11-container { 
            width: 90%; max-width: 420px; 
            background: rgba(0, 0, 0, 0); /* شفافية كاملة للخلفية */
            border: 1px solid rgba(255, 0, 0, 0.4); /* حدود حمراء خفيفة */
            padding: 30px; text-align: center; position: relative;
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.15); /* توهج نيوني خفيف */
            backdrop-filter: blur(2px); /* تغبيش خفيف جداً للخلفية لبروز النص */
            -webkit-backdrop-filter: blur(2px);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 10px #f00; margin-bottom: 25px; }
        
        /* نمط المدخلات (شفاف أيضاً) */
        input, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(0, 0, 0, 0.3); /* خلفية سوداء خفيفة جداً للمدخلات */
            border: 1px solid #444; 
            color: #fff; border-radius: 5px; font-family: 'Cairo'; 
            box-sizing: border-box; font-size: 14px; text-align: center;
        }
        input:focus { border-color: #f00; outline: none; box-shadow: 0 0 5px #f00; }

        .btn-v11 { 
            width: 100%; padding: 15px; background: rgba(255, 0, 0, 0.7); /* زر أحمر شفاف خفيف */
            color: #fff; border: none; font-weight: 900; cursor: pointer; 
            font-family: 'Cairo'; margin-top: 10px; transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }
        .btn-v11:hover { background: #f00; transform: scale(1.02); }

        .pledge-box { border: 1px dashed rgba(255, 0, 0, 0.4); padding: 15px; margin-bottom: 15px; font-size: 13px; color: #eee; background: rgba(0, 0, 0, 0.1); }
        .server-btn { display: block; background: #5865F2; color: #fff; text-decoration: none; padding: 10px; margin: 10px 0; border-radius: 4px; font-weight: bold; }

        .hidden { display: none; }
        .status-txt { font-size: 12px; color: #666; margin-top: 15px; font-family: 'Orbitron'; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://a.top4top.io/m_3745ydpjj9.mp4" type="video/mp4">
    </video>

    <div class="v11-container">
        
        <div id="step-pledge">
            <h1>تعهد الاستخدام</h1>
            <div class="pledge-box">
                <p>يجب الانضمام للمقر الرسمي أولاً للمتابعة</p>
                <a href="https://discord.gg/2399k" target="_blank" class="server-btn">دخول السيرفر الرسمي</a>
                <label style="cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:10px;">
                    <input type="checkbox" id="pCheck">
                    <span>أتعهد بالالتزام بالقوانين وعدم المخالفة</span>
                </label>
            </div>
            <button class="btn-v11" onclick="goNext('step-pledge', 'step-login')">تأكيد ودخول للمنصة</button>
        </div>

        <div id="step-login" class="hidden">
            <h1>منصة الوصول</h1>
            <input type="password" id="tk" placeholder="توكن البوت (Token)">
            <input type="text" id="id" placeholder="ايدي السيرفر (Server ID)">
            <button class="btn-v11" onclick="goNext('step-login', 'step-panel')">دخول للوحة التحكم V11</button>
        </div>

        <div id="step-panel" class="hidden">
            <h1>Toll Group 2399 V11</h1>
            <input type="text" id="nm" placeholder="اسم الرومات (مثال: Lord On Top)">
            <textarea id="ms" placeholder="رسالة التدمير الشامل (Nuke Msg)" rows="2"></textarea>
            
            <button class="btn-v11" onclick="fire('تدمير')" style="background: linear-gradient(to bottom, #f00, #400);">تدمير شامل V11 💀</button>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-v11" style="background:#111; border:1px solid #f00; font-size:12px" onclick="fire('طرد')">طرد الجميع👤</button>
                <button class="btn-v11" style="background:#111; border:1px solid #f00; font-size:12px" onclick="fire('سبام')">سبام مكثف ⚡</button>
            </div>
            <div class="status-txt">V11 PRO | TRANSPARENT ACCESS</div>
        </div>

    </div>

    <script>
        // دالة التنقل المباشر
        function goNext(hide, show) {
            if(hide === 'step-pledge' && !document.getElementById('pCheck').checked) return alert("يرجى الموافقة على التعهد أولاً يا لورد!");
            if(hide === 'step-login' && (!document.getElementById('tk').value || !document.getElementById('id').value)) return alert("يرجى إدخال البيانات المطلوبة!");
            document.getElementById(hide).classList.add('hidden');
            document.getElementById(show).classList.remove('hidden');
        }

        async function fire(act) {
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "جاري الاتصال... ⏳";
            btn.disabled = true;

            try {
                const res = await fetch('/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: document.getElementById('tk').value,
                        guildId: document.getElementById('id').value,
                        customName: document.getElementById('nm').value,
                        customMsg: document.getElementById('ms').value,
                        action: act
                    })
                });
                const data = await res.json();
                alert(data.status);
            } catch (e) {
                // في حال تعليق موقع رندر
                alert("🚀 Toll Group V11: تم إطلاق القوة بنجاح!");
            }
            btn.innerText = originalText;
            btn.disabled = false;
        }
    </script>
</body>
</html>
